<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glide N Chase</title>
<link rel="icon" href="tab-icon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --background-color: #050505;
  --control-background-color: rgba(255, 255, 255, 0.10);
  --control-border-color: rgba(255, 255, 255, 0.45);
  --knob-background-color: rgba(255, 255, 255, 0.78);
  --knob-glow-color: rgba(255, 255, 255, 0.35);
  --text-color: white;

  --left-control-left: 28px;
  --right-control-right: 28px;
  --control-bottom: 34px;
  --control-size: 218px;
  --knob-size: 54px;
  --left-slider-width: 58px;
  --left-slider-knob-width: 50px;
  --left-slider-knob-height: 46px;
}

html,
body,
#joystickControls,
#throttleControl,
#steerControl,
.knob {
  -webkit-user-select: none;
  user-select: none;

  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: var(--background-color);
  color: var(--text-color);
  font-family: system-ui, sans-serif;
}

canvas { display: block; }

#joystickControls {
  position: fixed;
  left: var(--left-control-left);
  right: var(--right-control-right);
  bottom: var(--control-bottom);
  height: var(--control-size);
  z-index: 20;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  pointer-events: none;
}

#throttleControl {
  position: relative;
  width: var(--left-slider-width);
  height: 100%;
  flex: 0 0 var(--left-slider-width);
  border: 2px solid var(--control-border-color);
  border-radius: 16px;
  background: var(--control-background-color);
  box-sizing: border-box;
  touch-action: none;
  pointer-events: auto;
}

#steerControl {
  position: relative;
  width: var(--control-size);
  height: 100%;
  flex: 0 0 var(--control-size);
  border: 2px solid var(--control-border-color);
  border-radius: 16px;
  background: var(--control-background-color);
  box-sizing: border-box;
  touch-action: none;
  pointer-events: auto;
}

.knob {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--knob-size);
  height: var(--knob-size);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: var(--knob-background-color);
  box-shadow: 0 0 18px var(--knob-glow-color);
  touch-action: none;
}

#throttleKnob {
  top: 0;
  width: var(--left-slider-knob-width);
  height: var(--left-slider-knob-height);
  border-radius: 12px;
}

#steerKnob { z-index: 3; }

#screenFlash {
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
}
</style>
</head>

<body>
<div id="screenFlash"></div>
<div id="joystickControls">
  <div id="throttleControl"><div id="throttleKnob" class="knob"></div></div>
  <div id="steerControl"><div id="steerKnob" class="knob"></div></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";

/* =========================
   CONFIG
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

const CONFIG = {
  render: {
    backgroundColor: 0x050505,
    maxPixelRatio: 2,
    maxDeltaTime: 0.05
  },

  camera: {
    fieldOfViewDegrees: 75,
    nearClipPlane: 0.01,
    farClipPlane: 1000,
    collisionRadius: 0.35,
    resetHeight: 20,
    floorMinimumY: 0.05
  },

  lighting: {
    skyColor: 0xffffff,
    groundColor: 0x202030,
    hemisphereIntensity: 1.7
  },

  movement: {
    joystickForwardSpeed: 10
  },

  angle: {
    fullTurnRadians: 2 * Math.PI,
    halfTurnRadians: Math.PI
  },

  grid: {
    halfCellCount: 12,
    cellSize: 2,
    lineColor: 0x66ccff
  },

  buildings: {
    count: 50,
    footprintWidth: 0.9,
    footprintDepth: 0.9,
    lowHeight: 0.35,
    highHeight: 2.8,
    oscillationSpeed: 1.8,
    color: 0xff2222,
    emissiveColor: 0x220000,
    collisionPadding: 0.08
  },

  sphere: {
    radius: 0.55,
    color: 0xffff00,
    emissiveColor: 0x555500,
    y: 0.55,
    touchDistance: 1.0,
    maxPlacementAttempts: 200,
    gridRunSpeed: 3.0,
    directionChangeChance: 0.35
  },

  random: {
    multiplier: 1664525,
    increment: 1013904223,
    unsignedIntMax: 4294967296,
    seed: 1
  },

  feedback: {
    flashMilliseconds: 50,
  },
};

/* =========================
   CANVAS SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.render.backgroundColor);

const camera = new THREE.PerspectiveCamera(
  CONFIG.camera.fieldOfViewDegrees,
  innerWidth / innerHeight,
  CONFIG.camera.nearClipPlane,
  CONFIG.camera.farClipPlane
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, CONFIG.render.maxPixelRatio));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(
  CONFIG.lighting.skyColor,
  CONFIG.lighting.groundColor,
  CONFIG.lighting.hemisphereIntensity
));

const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);

const worldGroup = new THREE.Group();
scene.add(worldGroup);

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* =========================
   SHARED CONTROL STATE
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

const joystickMoveInput = { x: 0, y: 0 };

const steeringState = {
  active: false,
  pointerId: null,
  xDeviation: 0,
  yDeviation: -Math.PI / 2
};

const CAMERA_LOCAL_FORWARD_AXIS = new THREE.Vector3(0, 0, -1);

/* =========================
   UTILITY SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

function randomUnit() {
  CONFIG.random.seed =
    (CONFIG.random.seed * CONFIG.random.multiplier + CONFIG.random.increment) >>> 0;

  return CONFIG.random.seed / CONFIG.random.unsignedIntMax;
}

function applyCameraOrientationFromSteering() {
  camera.quaternion.setFromEuler(
    new THREE.Euler(
      steeringState.yDeviation,
      -steeringState.xDeviation,
      0,
      "YXZ"
    )
  );
}

function flashScreen(colorCss) {
  const flash = document.getElementById("screenFlash");
  if (!flash) return;

  flash.style.background = colorCss;
  flash.style.opacity = "1";

  setTimeout(() => {
    flash.style.opacity = "0";
  }, CONFIG.feedback.flashMilliseconds);
}

/* =========================
   LEFT CONTROLLER SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

function setupMovementJoystick() {
  const slider = document.getElementById("throttleControl");
  const knob = document.getElementById("throttleKnob");

  let active = false;
  let activePointerId = null;

  function setSliderValue(value) {
    const clampedValue = Math.max(0, Math.min(1, value));
    joystickMoveInput.x = 0;
    joystickMoveInput.y = clampedValue;

    const trackHeight = slider.clientHeight;
    const knobHeight = knob.clientHeight;
    const travelPixels = trackHeight - knobHeight - 4;
    const knobY = 2 + travelPixels * (1 - clampedValue);

    knob.style.transform = `translate(-50%, ${knobY}px)`;
  }

  function updateSliderFromPointer(event) {
    const bounds = slider.getBoundingClientRect();
    const relativeY = event.clientY - bounds.top;
    const value = 1 - relativeY / bounds.height;

    setSliderValue(value);
  }

  slider.addEventListener("pointerdown", event => {
    event.stopPropagation();
    event.preventDefault();

    active = true;
    activePointerId = event.pointerId;
    slider.setPointerCapture(activePointerId);

    updateSliderFromPointer(event);
  });

  slider.addEventListener("pointermove", event => {
    if (!active || event.pointerId !== activePointerId) return;

    event.stopPropagation();
    event.preventDefault();
    updateSliderFromPointer(event);
  });

  function releaseSlider(event) {
    if (!active || event.pointerId !== activePointerId) return;

    event.stopPropagation();
    event.preventDefault();

    active = false;
    activePointerId = null;
  }

  slider.addEventListener("pointerup", releaseSlider);
  slider.addEventListener("pointercancel", releaseSlider);

  setSliderValue(0);
}

function updateJoystickMovement(deltaTime) {
  const forwardSpeed = joystickMoveInput.y * CONFIG.movement.joystickForwardSpeed;

  if (forwardSpeed > 0) {
    const forwardVector = CAMERA_LOCAL_FORWARD_AXIS
      .clone()
      .applyQuaternion(camera.quaternion)
      .normalize();

    rig.position.addScaledVector(forwardVector, forwardSpeed * deltaTime);
  }
}

function updateJoystickRotation() {
  applyCameraOrientationFromSteering();
}

/* =========================
   RIGHT CONTROLLER SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

function updateSteerKnobVisual() {
  const steerControl = document.getElementById("steerControl");
  const steerKnob = document.getElementById("steerKnob");

  if (!steerControl || !steerKnob) return;

  const xNormalized = steeringState.xDeviation / Math.PI;
  const yNormalized = -steeringState.yDeviation / Math.PI;

  const maxTravelX =
    (steerControl.clientWidth - steerKnob.clientWidth) / 2;

  const maxTravelY =
    (steerControl.clientHeight - steerKnob.clientHeight) / 2;

  steerKnob.style.transform =
    `translate(calc(-50% + ${xNormalized * maxTravelX}px), calc(-50% + ${yNormalized * maxTravelY}px))`;
}

function setupRightRotationControls() {
  const steerControl = document.getElementById("steerControl");

  function wrapRadians(value) {
    const range = CONFIG.angle.fullTurnRadians;
    return ((((value + Math.PI) % range) + range) % range) - Math.PI;
  }

  function updateSteeringFromPointerDelta(event) {
    const bounds = steerControl.getBoundingClientRect();

    const deltaX = event.movementX / bounds.width * CONFIG.angle.fullTurnRadians;
    const deltaY = event.movementY / bounds.height * CONFIG.angle.fullTurnRadians;

    steeringState.xDeviation = wrapRadians(steeringState.xDeviation + deltaX);
    steeringState.yDeviation = wrapRadians(steeringState.yDeviation - deltaY);

    updateSteerKnobVisual();
    applyCameraOrientationFromSteering();
  }

  steerControl.addEventListener("pointerdown", event => {
    event.stopPropagation();
    event.preventDefault();

    steeringState.active = true;
    steeringState.pointerId = event.pointerId;
    steerControl.setPointerCapture(steeringState.pointerId);
  });

  steerControl.addEventListener("pointermove", event => {
    if (!steeringState.active || event.pointerId !== steeringState.pointerId) return;

    event.stopPropagation();
    event.preventDefault();

    updateSteeringFromPointerDelta(event);
  });

  function releaseSteering(event) {
    if (!steeringState.active || event.pointerId !== steeringState.pointerId) return;

    event.stopPropagation();
    event.preventDefault();

    steeringState.active = false;
    steeringState.pointerId = null;
  }

  steerControl.addEventListener("pointerup", releaseSteering);
  steerControl.addEventListener("pointercancel", releaseSteering);

  updateSteerKnobVisual();
  applyCameraOrientationFromSteering();
}

/* =========================
   WORLD / GRID / BUILDING SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

const buildingMeshes = [];
const buildingGridCells = new Set();

function getGridCellCenter(cellX, cellZ) {
  const cell = CONFIG.grid.cellSize;

  return {
    x: cellX * cell + cell / 2,
    z: cellZ * cell + cell / 2
  };
}

function createUniformGrid() {
  const linePoints = [];
  const half = CONFIG.grid.halfCellCount;
  const cell = CONFIG.grid.cellSize;
  const extent = half * cell;

  for (let i = -half; i <= half; i++) {
    const coord = i * cell;

    linePoints.push(
      new THREE.Vector3(coord, 0, -extent),
      new THREE.Vector3(coord, 0, extent)
    );

    linePoints.push(
      new THREE.Vector3(-extent, 0, coord),
      new THREE.Vector3(extent, 0, coord)
    );
  }

  const lineGeometry = new THREE.BufferGeometry().setFromPoints(linePoints);
  const lineMaterial = new THREE.LineBasicMaterial({ color: CONFIG.grid.lineColor });

  worldGroup.add(new THREE.LineSegments(lineGeometry, lineMaterial));
}

function createWorldAxes() {
  const axisLength = CONFIG.grid.halfCellCount * CONFIG.grid.cellSize;

  const axes = [
    {
      points: [
        new THREE.Vector3(0, 0.03, 0),
        new THREE.Vector3(axisLength, 0.03, 0)
      ],
      color: 0xff4444
    },
    {
      points: [
        new THREE.Vector3(0, 0.03, 0),
        new THREE.Vector3(0, axisLength, 0)
      ],
      color: 0x44ff44
    },
    {
      points: [
        new THREE.Vector3(0, 0.03, 0),
        new THREE.Vector3(0, 0.03, axisLength)
      ],
      color: 0x4488ff
    }
  ];

  for (const axis of axes) {
    const geometry = new THREE.BufferGeometry().setFromPoints(axis.points);
    const material = new THREE.LineBasicMaterial({ color: axis.color });
    worldGroup.add(new THREE.Line(geometry, material));
  }
}

function createBuildings() {
  const material = new THREE.MeshStandardMaterial({
    color: CONFIG.buildings.color,
    emissive: CONFIG.buildings.emissiveColor
  });

  const half = CONFIG.grid.halfCellCount;
  const usableMin = -half;
  const usableMax = half - 1;
  const availableCells = [];

  for (let x = usableMin; x <= usableMax; x++) {
    for (let z = usableMin; z <= usableMax; z++) {
      if (Math.abs(x) <= 1 && Math.abs(z) <= 1) continue;
      availableCells.push({ x, z });
    }
  }

  for (let i = availableCells.length - 1; i > 0; i--) {
    const j = Math.floor(randomUnit() * (i + 1));
    [availableCells[i], availableCells[j]] = [availableCells[j], availableCells[i]];
  }

  const selectedCells = availableCells.slice(0, CONFIG.buildings.count);

  for (const cellPosition of selectedCells) {
    const center = getGridCellCenter(cellPosition.x, cellPosition.z);

    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(
        CONFIG.buildings.footprintWidth,
        1,
        CONFIG.buildings.footprintDepth
      ),
      material
    );

    mesh.position.x = center.x;
    mesh.position.z = center.z;
    mesh.userData.phase = randomUnit() * CONFIG.angle.fullTurnRadians;
    mesh.userData.cellX = cellPosition.x;
    mesh.userData.cellZ = cellPosition.z;

    worldGroup.add(mesh);
    buildingMeshes.push(mesh);
    buildingGridCells.add(`${cellPosition.x},${cellPosition.z}`);
  }
}

function updateBuildings(elapsedTimeSeconds) {
  for (const building of buildingMeshes) {
    const t = 0.5 + 0.5 * Math.sin(
      elapsedTimeSeconds * CONFIG.buildings.oscillationSpeed + building.userData.phase
    );

    const height = CONFIG.buildings.lowHeight +
      t * (CONFIG.buildings.highHeight - CONFIG.buildings.lowHeight);

    building.scale.y = height;
    building.position.y = height / 2;
    building.userData.currentHeight = height;
  }
}

/* =========================
   SPHERE / TARGET SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

let resetSphere;

const sphereRunState = {
  cellX: 0,
  cellZ: 0,
  dirX: 1,
  dirZ: 0,
  targetCellX: 1,
  targetCellZ: 0
};

function createResetSphere() {
  const geometry = new THREE.SphereGeometry(CONFIG.sphere.radius, 32, 16);
  const material = new THREE.MeshStandardMaterial({
    color: CONFIG.sphere.color,
    emissive: CONFIG.sphere.emissiveColor
  });

  resetSphere = new THREE.Mesh(geometry, material);
  worldGroup.add(resetSphere);

  resetSpherePosition();
}

function isCellBlocked(cellX, cellZ) {
  return buildingGridCells.has(`${cellX},${cellZ}`);
}

function isCellInsideGrid(cellX, cellZ) {
  const half = CONFIG.grid.halfCellCount;

  return (
    cellX >= -half &&
    cellX <= half - 1 &&
    cellZ >= -half &&
    cellZ <= half - 1
  );
}

function chooseSphereDirection() {
  const directions = [
    { x: 1, z: 0 },
    { x: -1, z: 0 },
    { x: 0, z: 1 },
    { x: 0, z: -1 }
  ];

  const validDirections = directions.filter(direction => {
    const nextX = sphereRunState.cellX + direction.x;
    const nextZ = sphereRunState.cellZ + direction.z;

    return isCellInsideGrid(nextX, nextZ) && !isCellBlocked(nextX, nextZ);
  });

  if (!validDirections.length) {
    sphereRunState.dirX = 0;
    sphereRunState.dirZ = 0;
    sphereRunState.targetCellX = sphereRunState.cellX;
    sphereRunState.targetCellZ = sphereRunState.cellZ;
    return;
  }

  const selected = validDirections[Math.floor(randomUnit() * validDirections.length)];

  sphereRunState.dirX = selected.x;
  sphereRunState.dirZ = selected.z;
  sphereRunState.targetCellX = sphereRunState.cellX + selected.x;
  sphereRunState.targetCellZ = sphereRunState.cellZ + selected.z;
}

function setSphereToCell(cellX, cellZ) {
  sphereRunState.cellX = cellX;
  sphereRunState.cellZ = cellZ;

  const center = getGridCellCenter(cellX, cellZ);
  resetSphere.position.set(center.x, CONFIG.sphere.y, center.z);

  chooseSphereDirection();
}

function resetSpherePosition() {
  const half = CONFIG.grid.halfCellCount;
  const usableMin = -half;
  const usableMax = half - 1;

  for (let attempt = 0; attempt < CONFIG.sphere.maxPlacementAttempts; attempt++) {
    const cellX = Math.floor(randomUnit() * (usableMax - usableMin + 1)) + usableMin;
    const cellZ = Math.floor(randomUnit() * (usableMax - usableMin + 1)) + usableMin;

    if (isCellBlocked(cellX, cellZ)) continue;

    setSphereToCell(cellX, cellZ);
    return;
  }

  setSphereToCell(0, 0);
}

function updateSphereGridRun(deltaTime) {
  if (!resetSphere) return;

  const targetCenter = getGridCellCenter(
    sphereRunState.targetCellX,
    sphereRunState.targetCellZ
  );

  const targetPosition = new THREE.Vector3(
    targetCenter.x,
    CONFIG.sphere.y,
    targetCenter.z
  );

  const toTarget = targetPosition.clone().sub(resetSphere.position);
  const distanceToTarget = toTarget.length();
  const travelDistance = CONFIG.sphere.gridRunSpeed * deltaTime;

  if (distanceToTarget <= travelDistance || distanceToTarget <= 0.0001) {
    resetSphere.position.copy(targetPosition);

    sphereRunState.cellX = sphereRunState.targetCellX;
    sphereRunState.cellZ = sphereRunState.targetCellZ;

    const nextCellX = sphereRunState.cellX + sphereRunState.dirX;
    const nextCellZ = sphereRunState.cellZ + sphereRunState.dirZ;

    const shouldTurn =
      randomUnit() < CONFIG.sphere.directionChangeChance ||
      !isCellInsideGrid(nextCellX, nextCellZ) ||
      isCellBlocked(nextCellX, nextCellZ);

    if (shouldTurn) {
      chooseSphereDirection();
    } else {
      sphereRunState.targetCellX = nextCellX;
      sphereRunState.targetCellZ = nextCellZ;
    }

    return;
  }

  resetSphere.position.addScaledVector(toTarget.normalize(), travelDistance);
}

/* =========================
   CAMERA / COLLISION SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

function resetCameraAboveGridCenterFacingDown() {
  rig.position.set(0, CONFIG.camera.resetHeight, 0);
  rig.quaternion.identity();
  rig.rotation.set(0, 0, 0);

  camera.position.set(0, 0, 0);
  camera.rotation.set(0, 0, 0);

  steeringState.xDeviation = 0;
  steeringState.yDeviation = -Math.PI / 2;
  updateSteerKnobVisual();
  applyCameraOrientationFromSteering();

  camera.updateMatrixWorld(true);
}

function cameraWorldPosition() {
  const position = new THREE.Vector3();
  camera.getWorldPosition(position);
  return position;
}

function isCameraCollidingWithBuilding(cameraPosition) {
  const halfWidth =
    CONFIG.buildings.footprintWidth / 2 +
    CONFIG.camera.collisionRadius +
    CONFIG.buildings.collisionPadding;

  const halfDepth =
    CONFIG.buildings.footprintDepth / 2 +
    CONFIG.camera.collisionRadius +
    CONFIG.buildings.collisionPadding;

  return buildingMeshes.some(building => {
    const height = building.userData.currentHeight ?? CONFIG.buildings.highHeight;

    return (
      cameraPosition.x >= building.position.x - halfWidth &&
      cameraPosition.x <= building.position.x + halfWidth &&
      cameraPosition.y >= 0 &&
      cameraPosition.y <= height + CONFIG.camera.collisionRadius &&
      cameraPosition.z >= building.position.z - halfDepth &&
      cameraPosition.z <= building.position.z + halfDepth
    );
  });
}

function maybeHandleCameraCollisions() {
  const position = cameraWorldPosition();

  if (position.y <= CONFIG.camera.floorMinimumY) {
    flashScreen("#66ccff");
    resetCameraAboveGridCenterFacingDown();
    return;
  }

  if (isCameraCollidingWithBuilding(position)) {
    flashScreen("#ff2222");
    resetCameraAboveGridCenterFacingDown();
  }
}

function maybeResetSphereOnTouch() {
  const position = cameraWorldPosition();

  if (position.distanceTo(resetSphere.position) <= CONFIG.sphere.touchDistance) {
    flashScreen("#ffff00");
    resetSpherePosition();
  }
}

/* =========================
   INIT / GAME LOOP SECTION
   DO NOT REMOVE: keep this section marker for editing and maintenance.
========================= */

setupMovementJoystick();
setupRightRotationControls();

createUniformGrid();
// createWorldAxes();
createBuildings();
createResetSphere();
resetCameraAboveGridCenterFacingDown();

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const deltaTime = Math.min(clock.getDelta(), CONFIG.render.maxDeltaTime);
  const elapsedTime = clock.elapsedTime;

  updateJoystickRotation();
  updateJoystickMovement(deltaTime);
  updateBuildings(elapsedTime);
  updateSphereGridRun(deltaTime);
  maybeResetSphereOnTouch();
  maybeHandleCameraCollisions();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
